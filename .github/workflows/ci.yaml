name: CI
on:
  push:
    branches:
      - main
      - dev
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_flask_app.py -v

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/weather_app_frontend:${{ github.sha }}

      - name: Update image tag in gitops-application
        if: github.ref == 'refs/heads/main'
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/henria/gitops-application.git
          cd gitops-application

          # Bump the image tag in values-dev.yaml
          sed -i "s|tag: .*|tag: \"${{ github.sha }}\"|" charts/weather-frontend/values-dev.yaml

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add charts/weather-frontend/values-dev.yaml
          git commit -m "chore: bump weather-frontend to ${{ github.sha }}"
          git push
